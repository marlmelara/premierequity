<svg width="2400" height="1350" viewBox="0 0 2400 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbf6"/>
      <stop offset="0.55" stop-color="#f1f5e9"/>
      <stop offset="1" stop-color="#e4eed7"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fdfbef" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fdfbef" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="2400" height="1350" fill="url(#sky)"/>

  <!-- Soft sun glow, upper right -->
  <circle cx="1880" cy="360" r="430" fill="url(#sun)"/>
  <circle cx="1880" cy="360" r="120" fill="#fdfae8" opacity="0.55"/>

  <!-- Faint clouds -->
  <g fill="#ffffff" opacity="0.7" filter="url(#soft)">
    <ellipse cx="560" cy="330" rx="260" ry="52"/>
    <ellipse cx="700" cy="300" rx="170" ry="46"/>
    <ellipse cx="1500" cy="230" rx="230" ry="46"/>
    <ellipse cx="1040" cy="440" rx="200" ry="40"/>
  </g>

  <!-- Rolling hills, far (light) to near (deeper) -->
  <path d="M0,860 C 500,780 900,850 1300,810 S 2050,760 2400,830 L2400,1350 L0,1350 Z" fill="#dbe7c8"/>
  <path d="M0,960 C 420,900 820,970 1250,930 S 2000,880 2400,950 L2400,1350 L0,1350 Z" fill="#c2d7a4"/>
  <path d="M0,1070 C 480,1010 760,1090 1200,1055 S 1980,1010 2400,1075 L2400,1350 L0,1350 Z" fill="#a2bf7c"/>

  <!-- Lone trees on the mid hill -->
  <g>
    <rect x="1786" y="980" width="16" height="70" rx="4" fill="#6b5a3c"/>
    <circle cx="1794" cy="958" r="52" fill="#6f9b45"/>
    <circle cx="1758" cy="982" r="40" fill="#7ba64f"/>
    <circle cx="1830" cy="982" r="42" fill="#638a3d"/>
    <rect x="1874" y="1004" width="12" height="52" rx="3" fill="#6b5a3c"/>
    <circle cx="1880" cy="988" r="36" fill="#77a24b"/>
  </g>

  <!-- Foreground hill (deepest) -->
  <path d="M0,1170 C 520,1120 900,1190 1350,1150 S 2050,1120 2400,1175 L2400,1350 L0,1350 Z" fill="#7ea656"/>
  <path d="M0,1260 C 600,1220 1000,1275 1450,1245 S 2100,1225 2400,1265 L2400,1350 L0,1350 Z" fill="#5f8b3d"/>
</svg>
